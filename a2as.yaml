manifest:
  version: "0.1.2"
  schema: https://a2as.org/cert/schema
  subject:
    name: agoda-com/api-agent
    source: https://github.com/agoda-com/api-agent
    branch: main
    commit: "567ecb74"
    scope: [api_agent/agent/graphql_agent.py, api_agent/agent/model.py, api_agent/agent/progress.py, api_agent/agent/prompts.py,
      api_agent/agent/rest_agent.py, api_agent/agent/schema_search.py, api_agent/context.py, api_agent/middleware.py]
  issued:
    by: A2AS.org
    at: '2026-01-26T16:12:55Z'
  signatures:
    digest: sha256:jpf1ht2qOmcHCHLr9nIY1U2clbDZDomtoFaBbhNg49g
    key: ed25519:QezZqi7Hdsc8m5IDtl-rl8-H90_HGKmzIoap00PheSk
    sig: ed25519:RwwvfEU5V1U7AbkbiQ1dU4We55PORfol9Kt3p8kj_aRTASlelJ14Th6Vy7INgUCshS-ltYLYW6dfjbKsV6RhAg

agents:
  agent.0:
    type: instance
    models: [model]
    tools: [tools]
    params:
      function: process_rest_query
      name: rest-agent
      instance: agent
      instructions: [_build_system_prompt(poll_paths=ctx.poll_paths)]
  agent.1:
    type: instance
    models: [model]
    tools: [gql_tool, sql_query, search_schema]
    params:
      function: process_query
      name: graphql-agent
      instance: agent
      instructions: [_build_system_prompt()]

models:
  model:
    type: variable
    agents: [agent.0, agent.1]

tools:
  gql_tool:
    type: variable
    agents: [agent.1]
    params:
      dynamic: "True"
  graphql_query:
    type: decorator
    params:
      description: |-
        Execute GraphQL query and store result for sql_query.

        Args:
            query: GraphQL query string
            name: Table name for sql_query (default: "data")

        Returns:
            JSON string with query results
  poll_until_done:
    type: decorator
    params:
      description: |-
        Poll endpoint until done_field equals done_value. Auto-increments polling.count if present.

        Args:
            method: HTTP method (POST typically)
            path: API path
            done_field: Dot-path to check (e.g., "status", "polling.completed", "trips.0.isCompleted")
            done_value: Value indicating done (e.g., "true", "0", "COMPLETED", "100")
            body: JSON string request body
            path_params: JSON string for path values
            query_params: JSON string for query params
            name: Table name for sql_query (default: poll_result)
            delay_ms: Delay between polls in ms (default: 3000ms)

        Returns:
            JSON string with final response or error
  rest_call:
    type: decorator
    params:
      description: |-
        Execute REST API call and store result for sql_query.

        Args:
            method: HTTP method (GET recommended, others may be blocked)
            path: API path (e.g., /users/{id})
            path_params: JSON string for path values (e.g., '{"id": "123"}')
            query_params: JSON string for query params (e.g., '{"limit": 10}')
            body: JSON string for request body (e.g., '{"name": "John"}')
            name: Table name for sql_query (default: "data")

        Returns:
            JSON string with API response
  search_schema:
    type: decorator
    agents: [agent.1]
    params:
      description: |-
        Grep-like search on schema. Output: "line_num:match" or "line_num-context".

        Args:
            pattern: Regex pattern (case-insensitive)
            context: Lines around each match (default 10)
            before: Lines before match (overrides context)
            after: Lines after match (overrides context)
            offset: Number of matches to skip (for pagination)
  sql_query:
    type: decorator
    agents: [agent.1]
    params:
      description: |-
        Run DuckDB SQL on stored REST API results.

        Tables available = names from rest_call calls + auto-extracted top-level keys.

        Args:
            sql: DuckDB SQL query

        Returns:
            JSON string with query results
  tools:
    type: variable
    agents: [agent.0]
    params:
      dynamic: "True"

